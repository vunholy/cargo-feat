[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
rustflags = [
  "-C", "target-cpu=native",
  "-C", "target-feature=+avx2,+fma",
  "-C", "link-arg=/DEBUG:NONE",
  "-C", "link-arg=/OPT:REF",
  "-C", "link-arg=/OPT:ICF",
]

[build]
rustflags = [
  "-C", "target-cpu=native",
  "-C", "target-feature=+avx2,+fma"
]
